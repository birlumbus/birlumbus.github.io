<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Ripple</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <canvas id="canvas"></canvas>

  <!-- Click anywhere to unlock audio (required by browsers). -->
  <button type="button" id="unlock-overlay" class="unlock-overlay unlock-overlay--text" aria-label="Click to begin">
    <span class="unlock-message">click to begin</span>
    <span id="browser-note" class="unlock-note" hidden>(best in chrome)</span>
  </button>

  <!-- First-load onboarding hint. Fades out on first pointer/touch event. -->
  <div id="hint">move to listen</div>

  <!-- Preset controls. Built dynamically by main.js. -->
  <div id="presets">
    <div id="voice-row" class="chip-row" aria-label="Voice preset"></div>
    <div id="chord-pad-grid" class="chord-pad-grid" aria-label="Chord pads"></div>
    <div id="key-panel" class="key-panel" aria-label="Selected chord key">
      <div id="key-panel-title" class="key-panel-title" aria-live="polite"></div>
      <div id="key-row" class="key-row"></div>
    </div>
  </div>

  <!-- Single ES-module entry point. All other files are imported from here. -->
  <script type="module" src="main.js"></script>

</body>
</html>
